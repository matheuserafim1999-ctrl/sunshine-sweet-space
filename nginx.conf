server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/x-javascript application/json
        application/xml application/rss+xml application/atom+xml
        image/svg+xml font/ttf font/otf font/woff font/woff2;

    # Segurança básica
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache longo para assets versionáveis
    location ~* \.(?:css|js|jpg|jpeg|png|webp|gif|svg|ico|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # HTML sempre revalidado
    location ~* \.html$ {
        expires 0;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Bloqueia .php (não temos runtime PHP)
    location ~ \.php$ { return 404; }

    # Fallback: se não achar, manda pro /front/
    location / {
        try_files $uri $uri/ $uri/index.html /front/index.html;
    }

    error_page 404 /front/index.html;
}
