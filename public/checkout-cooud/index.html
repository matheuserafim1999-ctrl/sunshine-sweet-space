<!DOCTYPE html>
<html lang="es-ES">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Checkout — Liberación de retiro</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #fff; }
    iframe { width: 100vw; height: 100vh; border: 0; display: block; }
  </style>
</head>
<body>
  <iframe
    id="cooud-checkout-frame"
    src="https://checkout.cooud.com/embed/01KSH6GYVC6BYGG2TP4MFDA9XY"
    allow="payment; storage-access"
    scrolling="auto"></iframe>
  <script>
    (function () {
      var frame = document.getElementById("cooud-checkout-frame");
      window.addEventListener("message", function (event) {
        if (event.origin !== "https://checkout.cooud.com") return;
        if (frame && event.source !== frame.contentWindow) return;
        var data = event.data || {};
        if (data._cooud !== true || data.v !== 1) return;
        if (data.type === "cooud:redirect" && typeof data.url === "string") {
          window.location.replace(data.url);
        }
      });
    })();
  </script>
</body>
</html>
